  <script>
    fetch("notes/pg-occ.md")
      .then(function(r) { return r.text(); })
      .then(function(md) {
        // 1. Extract math blocks BEFORE marked touches them
        var stash = [];
        function save(expr, display) {
          stash.push({expr: expr, display: display});
          return "\x02MATH" + (stash.length - 1) + "\x03";
        }
        // Display math $$...$$
        md = md.replace(/\$\$([\s\S]+?)\$\$/g, function(_, e) { return save(e, true); });
        // Inline math $...$
        md = md.replace(/\$([^\$\n]+?)\$/g,    function(_, e) { return save(e, false); });

        // 2. Parse markdown
        var html = marked.parse(md);

        // 3. Restore math with KaTeX
        html = html.replace(/\x02MATH(\d+)\x03/g, function(_, i) {
          var m = stash[parseInt(i)];
          return katex.renderToString(m.expr, {displayMode: m.display, throwOnError: false});
        });

        document.getElementById("note-body").innerHTML = html;
      });
  </script>
